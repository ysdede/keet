name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - '.github/workflows/deploy-gh-pages.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Work around npm optional dependency bug (rollup native package)
        run: |
          if [ ! -d "node_modules/@rollup/rollup-linux-x64-gnu" ]; then
            echo "Missing @rollup/rollup-linux-x64-gnu; installing fallback package"
            ROLLUP_VERSION=$(node -p "require('./node_modules/rollup/package.json').version")
            npm install --no-save "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"
          fi

      - name: Build
        env:
          BASE_PATH: '/keet/'
        run: npm run build

      - name: Prepare deployment files
        run: |
          mkdir -p deploy_temp
          cp -r dist/* deploy_temp/
          touch deploy_temp/.nojekyll
          echo "{\"branch\": \"master\", \"commit\": \"$(git rev-parse --short HEAD)\"}" > deploy_temp/git-info.json
          # Paths are relative in index.html and sw.js is base-agnostic; no sed needed

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy_temp
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'Deploy: ${{ github.event.head_commit.message }}'
